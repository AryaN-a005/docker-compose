services:
  mongo:
    image: mongo
    container_name: mongo_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    environment:
      - MONGO_URL=mongodb://mongo:27017/
    ports:
      - "5001:5000"
    depends_on:
      - mongo

volumes:
  mongo_data:

